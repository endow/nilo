schema_version: 1
name: release
title: リリース {target_version}
summary: バージョン更新、検証、人間承認ゲート付きの GitHub release までを Nilo リリースとして準備する。
instruction: |
  指定されたリリースバージョンを、狭く監査しやすい範囲で準備する。

  プロジェクトが管理する version source を {target_version} に更新する。前回リリース番号の
  古い参照が残っていないか確認し、必要に応じてリリース向けドキュメントを更新する。
  無関係な実装変更はこのタスクに含めない。

  ローカルのリリース証跡、推奨 tag、GitHub release 実行、リリースノート草稿を準備する。
  リリースノート草稿は、"リリースノート（日本語）" を先に、"Release Notes (English)" を
  後に置く。各セクションを提案としてラベル付けしない。ここでの草稿は人間承認ゲート前の
  引き渡し内容を指し、リリースノート本文を暫定表現にするという意味ではない。

  GitHub 公開は human gate として扱う。人間がその操作を明示的に依頼しない限り、
  agent は commit、tag、push、GitHub release 作成、force option 使用を行わない。
  明示承認後は、tag、push、GitHub release 作成手順を人間に戻すのではなく、
  Nilo の release public-operation 実行経路を使う。

  検証に失敗した場合も、このリリースTaskをopenのまま維持し、同じTask内で原因を
  修正して `nilo release resume` を実行する。修正Taskや子Taskを自動作成しない。
  公開操作には人間の明示承認が必要であり、完了または中止時にはrecipe runとTaskを
  同じトランザクションで同時に閉じる。
acceptance:
  - プロジェクトの version source が {target_version} に更新されている。
  - 変更後も builtin recipe とリリースドキュメントが有効である。
  - 検証証跡にテストスイート、または未実行理由が記録されている。
  - リリースノート草稿に、主な変更、検証、必要な upgrade/install notes が含まれている。
  - GitHub release 実行用のリリースノート草稿が日本語先、英語後で書かれている。
  - GitHub release の次手順は承認ゲート付きで、承認済みの tag、push、release 作成を Nilo が実行できる。
  - 検証失敗は同じリリースTask内で修正され、新しい修正Taskや子Taskが作成されない。
  - 完了時はrecipe runと対応Taskが同時にcompletedになる。
variables:
  target_version:
    type: string
    required: true
verification:
  - command: "nilo check \"PYTHONPATH=src python tests/run_shards.py --all --jobs auto\" --project {project_id} --mode full --timeout 600"
    reason: "Run and record the parallel shard full check before release handoff."
  - command: "nilo recipe doctor --project {project_id}"
    reason: "Confirm bundled and project recipes are valid."
  - command: "nilo status --project {project_id}"
    reason: "Confirm Nilo state before reporting release readiness."
review:
  required: false
  focus:
    - version consistency
    - release scope
    - GitHub human gates
completion_contract:
  evidence:
    - 変更ファイル一覧が記録されている
    - version 確認結果が記録されている
    - 検証コマンド出力が記録されている
    - 日本語先、英語後のリリースノート草稿本文が含まれている
    - GitHub release 実行メモが含まれている
    - recipe runと対応Taskが原子的に同時完了する
tags:
  - release
  - github
stability: experimental
