schema_version: 1
name: release
title: Release {target_version}
summary: Prepare a Nilo release with version updates, verification, and GitHub release handoff.
instruction: |
  Prepare the requested release version in a narrow, auditable scope.

  Update all project-owned version sources for {target_version}. Check for stale
  references to the previous release number, update release-facing documentation
  when needed, and keep unrelated implementation changes out of the task.

  Prepare local release evidence, a suggested tag, GitHub CLI commands, and a
  release notes draft for human handoff. The release notes draft must include a
  Japanese section first and an English section second, using the headings
  "リリースノート（日本語）" and "Release Notes (English)" without labeling the
  sections as proposals. Here, draft means pre-human-gate handoff content, not
  tentative wording inside the release notes. Treat GitHub publication as a
  human gate: the agent must not commit, tag, push, create a GitHub release, or
  use force options unless the human explicitly asks for that exact action.
acceptance:
  - Project version sources are updated to {target_version}.
  - Builtin recipes and release documentation remain valid after the change.
  - Verification evidence includes the test suite or a documented reason it was not run.
  - Release notes draft covers notable changes, verification, and upgrade/install notes when relevant.
  - Release notes draft is written in Japanese first and English second for GitHub release handoff.
  - GitHub release next steps are prepared without crossing human-gated commit, tag, push, or release creation actions.
variables:
  target_version:
    type: string
    required: true
verification:
  - command: "nilo check \"python -m unittest discover tests\" --project {project_id} --timeout 300"
    reason: "Run and record the project test suite before release handoff with a full-suite timeout."
  - command: "nilo recipe doctor --project {project_id}"
    reason: "Confirm bundled and project recipes are valid."
  - command: "nilo status --project {project_id}"
    reason: "Confirm Nilo state before reporting release readiness."
review:
  required: false
  focus:
    - version consistency
    - release scope
    - GitHub human gates
completion_contract:
  evidence:
    - changed files are listed
    - version check output is recorded
    - verification command output is recorded
    - release notes draft text is included with Japanese first and English second
    - GitHub release handoff notes are included
tags:
  - release
  - github
stability: experimental
