schema_version: 1
name: focused-implementation
title: Focused Implementation
summary: Implement a small scoped change with explicit verification and review boundaries.
instruction: |
  Implement the requested change in the smallest scope that satisfies the acceptance criteria.
acceptance:
  - Requested behavior is implemented.
  - Existing behavior outside the requested scope is preserved.
  - Tests or verification evidence are recorded.
variables:
  change:
    type: string
    required: true
  verification_command:
    type: string
    required: true
verification:
  - command: "nilo check \"{verification_command}\" --project {project_id} --mode targeted --timeout 120"
    reason: "Run the changed-module or focused test command selected for this implementation and record it as targeted verification evidence."
review:
  required: false
  focus:
    - behavioral regressions
    - missing tests
completion_contract:
  evidence:
    - changed files are listed
    - verification command output is recorded
stability: experimental
